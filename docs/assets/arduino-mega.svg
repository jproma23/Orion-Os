<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 120" role="img"
     aria-labelledby="mega-t" fill="none" stroke="currentColor" stroke-width="2">
  <title id="mega-t">Arduino Mega 2560, o firmware</title>

  <!-- placa, com o canto chanfrado caracteristico -->
  <path d="M10 22h228a6 6 0 0 1 6 6v52a6 6 0 0 1-6 6H30l-20-14V28a6 6 0 0 1 6-6z"
        opacity=".9"/>

  <!-- conector USB-B -->
  <rect x="2" y="34" width="18" height="24" rx="2" fill="none"/>
  <!-- jack de alimentacao -->
  <rect x="2" y="66" width="16" height="18" rx="4" opacity=".8"/>

  <!-- barras de pinos: digital em cima, analogica/power embaixo -->
  <rect x="46" y="14" width="96" height="10" rx="2"/>
  <rect x="152" y="14" width="72" height="10" rx="2"/>
  <rect x="60" y="84" width="60" height="10" rx="2"/>
  <rect x="130" y="84" width="86" height="10" rx="2"/>
  <g stroke-width="2.2" opacity=".5">
    <path d="M51 19h3M59 19h3M67 19h3M75 19h3M83 19h3M91 19h3M99 19h3M107 19h3
             M115 19h3M123 19h3M131 19h3M157 19h3M165 19h3M173 19h3M181 19h3
             M189 19h3M197 19h3M205 19h3M213 19h3"/>
    <path d="M65 89h3M73 89h3M81 89h3M89 89h3M97 89h3M105 89h3M113 89h3
             M135 89h3M143 89h3M151 89h3M159 89h3M167 89h3M175 89h3M183 89h3
             M191 89h3M199 89h3M207 89h3"/>
  </g>

  <!-- microcontrolador ATmega2560 -->
  <rect x="150" y="40" width="56" height="28" rx="2"/>
  <circle cx="157" cy="47" r="2" opacity=".6"/>
  <!-- cristal -->
  <rect x="60" y="44" width="20" height="11" rx="5" opacity=".7"/>
  <!-- botao de reset -->
  <rect x="30" y="42" width="14" height="14" rx="2" opacity=".8"/>
  <circle cx="37" cy="49" r="3.5" fill="currentColor" stroke="none" opacity=".5"/>

  <!-- leds de TX/RX e L -->
  <circle cx="100" cy="66" r="2.6" fill="currentColor" stroke="none" opacity=".85"/>
  <circle cx="110" cy="66" r="2.6" fill="currentColor" stroke="none" opacity=".55"/>
  <circle cx="120" cy="66" r="2.6" fill="currentColor" stroke="none" opacity=".35"/>
</svg>
