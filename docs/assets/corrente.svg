<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img"
     aria-labelledby="ch-t" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif">
  <title id="ch-t">Os tres computadores do ORION OS e como se ligam</title>

  <g fill="none" stroke="currentColor" stroke-width="1.8">

    <!-- ---------- Notebook: Mission Core ---------- -->
    <g transform="translate(20,44)">
      <rect x="0" y="0" width="190" height="112" rx="10" opacity=".35"/>
      <g transform="translate(28,18) scale(.62)">
        <rect x="34" y="16" width="172" height="106" rx="7"/>
        <rect x="46" y="28" width="148" height="82" rx="3" opacity=".45"/>
        <circle cx="100" cy="60" r="8.5" fill="currentColor" stroke="none"/>
        <circle cx="140" cy="60" r="8.5" fill="currentColor" stroke="none"/>
        <path d="M98 84q22 16 44 0" stroke-width="3.5" stroke-linecap="round"/>
        <path d="M14 122h212l-8 14a6 6 0 0 1-5 3H27a6 6 0 0 1-5-3l-8-14z"/>
      </g>
    </g>

    <!-- ---------- Raspberry Pi: Motion Core ---------- -->
    <g transform="translate(265,44)">
      <rect x="0" y="0" width="190" height="112" rx="10" opacity=".35"/>
      <g transform="translate(24,22) scale(.63)">
        <rect x="14" y="14" width="192" height="122" rx="6"/>
        <rect x="40" y="20" width="132" height="11" rx="2"/>
        <rect x="84" y="56" width="38" height="38" rx="3"/>
        <rect x="46" y="60" width="26" height="18" rx="2" opacity=".7"/>
        <rect x="176" y="48" width="30" height="26" rx="2"/>
        <rect x="176" y="82" width="30" height="26" rx="2"/>
        <rect x="176" y="114" width="30" height="22" rx="2" opacity=".8"/>
      </g>
    </g>

    <!-- ---------- Arduino Mega: firmware ---------- -->
    <g transform="translate(510,44)">
      <rect x="0" y="0" width="190" height="112" rx="10" opacity=".35"/>
      <g transform="translate(14,28) scale(.63)">
        <path d="M10 22h228a6 6 0 0 1 6 6v52a6 6 0 0 1-6 6H30l-20-14V28a6 6 0 0 1 6-6z"/>
        <rect x="2" y="34" width="18" height="24" rx="2"/>
        <rect x="46" y="14" width="96" height="10" rx="2"/>
        <rect x="152" y="14" width="72" height="10" rx="2"/>
        <rect x="60" y="84" width="60" height="10" rx="2"/>
        <rect x="130" y="84" width="86" height="10" rx="2"/>
        <rect x="150" y="40" width="56" height="28" rx="2"/>
      </g>
    </g>

    <!-- ---------- setas entre as caixas ---------- -->
    <g stroke-width="2" marker-end="url(#pta)">
      <path d="M216 100h40"/>
      <path d="M461 100h40"/>
    </g>
  </g>

  <defs>
    <marker id="pta" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0 0l10 5-10 5z" fill="currentColor"/>
    </marker>
  </defs>

  <!-- ---------- rotulos ---------- -->
  <g fill="currentColor" text-anchor="middle">
    <g font-size="14" font-weight="600">
      <text x="115" y="30">Notebook</text>
      <text x="360" y="30">Raspberry Pi 4B</text>
      <text x="605" y="30">Arduino Mega</text>
    </g>
    <g font-size="12" opacity=".62">
      <text x="115" y="176">Mission Core</text>
      <text x="115" y="192">visao, voz, o rosto</text>
      <text x="360" y="176">Motion Core</text>
      <text x="360" y="192">kernel, decisao, sensores</text>
      <text x="605" y="176">Firmware</text>
      <text x="605" y="192">motores, ultrassom, IMU</text>
    </g>
    <g font-size="11" opacity=".62">
      <text x="236" y="92">cabo</text>
      <text x="481" y="92">USB</text>
    </g>
  </g>
</svg>
