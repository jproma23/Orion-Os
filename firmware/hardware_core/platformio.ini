[env:megaatmega2560]
platform = atmelavr
board = megaatmega2560
framework = arduino
monitor_speed = 115200
; Buffers padrao do core AVR sao so 64 bytes (RX e TX) - pequeno demais para
; nao perder bytes enquanto o Serial.write() do HEARTBEAT/TELEMETRY periodico
; (chamado direto no loop(), bloqueante) segura a CPU por alguns ms e atrasa
; a leitura de um COMMAND chegando ao mesmo tempo (causa real de ACK perdido
; investigada em 2026-07-18, ver docs/journal.md). TX maior e o que mais
; importa: reduz o tempo que Serial.write() fica bloqueado antes do loop()
; voltar a checar Serial.available(). RAM sobra de sobra no Mega (8KB) para
; os +384 bytes extra desses dois buffers.
build_flags =
    -D SERIAL_RX_BUFFER_SIZE=256
    -D SERIAL_TX_BUFFER_SIZE=256
lib_deps =
    bblanchon/ArduinoJson@^7.2
    adafruit/Adafruit MPU6050@^2.2
    adafruit/Adafruit Unified Sensor@^1.1
    adafruit/DHT sensor library@^1.4
    Servo
